description: LEG node with integrated coxa and femur PWM configuration
compatible: "danovski,leg"

include: base.yaml

properties:
  pwms:
    type: phandle-array
    required: true
    description: |
      PWM specifiers for leg joints.
      Index 0 is coxa and index 1 is femur.

  pwm-names:
    type: string-array
    required: true
    description: PWM names, expected order is "coxa", "femur".

  coxa-min-pulse:
    type: int
    required: true
    description: Minimum coxa pulse width in nanoseconds.

  coxa-max-pulse:
    type: int
    required: true
    description: Maximum coxa pulse width in nanoseconds.

  femur-min-pulse:
    type: int
    required: true
    description: Minimum femur pulse width in nanoseconds.

  femur-max-pulse:
    type: int
    required: true
    description: Maximum femur pulse width in nanoseconds.
