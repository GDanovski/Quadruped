description: Measurements sensor backed by one ADC channel
compatible: "danovski,measurements"

include: sensor-device.yaml

properties:
  io-channels:
    type: phandle-array
    required: true

  resolution:
    type: int
    description: ADC sequence resolution in bits.
    default: 12

  oversampling:
    type: int
    description: ADC sequence oversampling factor.
    default: 4

  calibrate:
    type: boolean
    description: Run ADC calibration before the sequence.

  voltage-divider-r1:
    type: int
    description: Voltage divider numerator to scale ADC reading to actual voltage.
    default: 1

  voltage-divider-r2:
    type: int
    description: Voltage divider denominator to scale ADC reading to actual voltage.
    default: 1
