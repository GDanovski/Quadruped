description: Quadruped robot controller node with four leg child devices
compatible: "danovski,quadruped"

include: base.yaml

properties:
  leg-front-left:
    type: phandle
    required: true
    description: Phandle to the front-left leg device.

  leg-front-right:
    type: phandle
    required: true
    description: Phandle to the front-right leg device.

  leg-back-left:
    type: phandle
    required: true
    description: Phandle to the back-left leg device.

  leg-back-right:
    type: phandle
    required: true
    description: Phandle to the back-right leg device.
