name: Build Firmware

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: ghcr.io/zephyrproject-rtos/ci:v0.27.4

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize west workspace
        run: |
          west init -l .
          west update
          west zephyr-export

      - name: Build firmware (promicro_nrf52840/nrf52840)
        run: |
          west build -b promicro_nrf52840/nrf52840 -p always

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zephyr-build-promicro_nrf52840-nrf52840
          path: |
            build/zephyr/zephyr.elf
            build/zephyr/zephyr.hex
            build/zephyr/zephyr.bin
            build/zephyr/zephyr.map
          if-no-files-found: error
